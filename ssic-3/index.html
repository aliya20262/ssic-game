<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Spendings — Investment Challenge</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#2563eb;--blue-d:#1d4ed8;--blue-l:#eff6ff;--blue-b:#bfdbfe;--green:#059669;--green-l:#f0fdf4;--green-b:#86efac;--red:#dc2626;--red-l:#fef2f2;--red-b:#fca5a5;--amber:#d97706;--amber-l:#fffbeb;--amber-b:#fcd34d;--purple:#7c3aed;--gray:#6b7280;--gray-l:#f9fafb;--gray-b:#e5e7eb;--text:#111827;--text2:#374151;--text3:#6b7280;--bg:#f0f2f5;--card:#ffffff;--r:14px;--r-sm:10px;--r-xs:8px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.page{display:none;min-height:100vh;padding:16px 16px 40px}.page.active{display:block}
.wrap{max-width:720px;margin:0 auto}.wide{max-width:1100px;margin:0 auto}

/* LANG */
.lang-bar{position:fixed;top:12px;right:16px;z-index:1000;display:flex;gap:4px;background:rgba(255,255,255,.97);border:1px solid var(--gray-b);border-radius:24px;padding:4px;box-shadow:0 2px 12px rgba(0,0,0,.1)}
.lang-btn{border:none;background:transparent;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;color:var(--text3);transition:all .15s;font-family:inherit}
.lang-btn:hover{background:var(--gray-l);color:var(--text)}.lang-btn.active{background:var(--blue);color:#fff}

/* TYPE */
.brand{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--blue)}
.label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3)}
.sub{font-size:14px;color:var(--text3);line-height:1.7}

/* BTN */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 28px;border:none;border-radius:var(--r-xs);font-size:14px;font-weight:700;cursor:pointer;transition:all .18s;font-family:inherit}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:var(--blue-d);transform:translateY(-1px)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#047857;transform:translateY(-1px)}
.btn-outline{background:var(--card);color:var(--text2);border:1.5px solid var(--gray-b)}.btn-outline:hover{background:var(--gray-l)}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#b91c1c}
.btn-amber{background:var(--amber);color:#fff}.btn-amber:hover{background:#b45309}
.btn-purple{background:var(--purple);color:#fff}.btn-purple:hover{background:#6d28d9}
.btn-lg{padding:15px 40px;font-size:16px;border-radius:var(--r-sm)}
.btn-sm{padding:8px 16px;font-size:13px}.btn-block{width:100%;margin-bottom:10px}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}

/* CARD */
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--gray-b);padding:20px}
.card-sm{background:var(--card);border-radius:var(--r-sm);border:1px solid var(--gray-b);padding:14px}

/* LAYOUT */
.flex{display:flex;align-items:center;gap:10px}.flex-between{display:flex;align-items:center;justify-content:space-between}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mb24{margin-bottom:24px}.mt16{margin-top:16px}
.tc{text-align:center}.up{color:var(--green)}.dn{color:var(--red)}.gray{color:var(--text3)}

/* BADGE */
.badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.badge-red{background:#fee2e2;color:#991b1b}.badge-green{background:#dcfce7;color:#166534}
.badge-amber{background:#fef3c7;color:#92400e}.badge-gray{background:#f3f4f6;color:#374151}

/* INPUT */
input[type=text],input[type=password]{width:100%;padding:12px 14px;border:1.5px solid var(--gray-b);border-radius:var(--r-xs);font-size:14px;font-family:inherit;outline:none;transition:border .15s;background:#fff;color:var(--text)}
input:focus{border-color:var(--blue)}input[type=range]{width:100%;accent-color:var(--blue);margin:6px 0 4px}

/* AVATAR */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;flex-shrink:0}
.av-sm{width:32px;height:32px;font-size:12px}.av-md{width:44px;height:44px;font-size:16px}
.av-lg{width:64px;height:64px;font-size:24px}.av-xl{width:80px;height:80px;font-size:28px}

/* TOPBAR */
.topbar{background:var(--card);border-radius:var(--r);border:1px solid var(--gray-b);padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.tb-val{font-size:24px;font-weight:800}

/* PROG */
.prog-track{height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .5s}

/* LB */
.lb{background:var(--card);border-radius:var(--r);border:1px solid var(--gray-b);overflow:hidden}
.lb-head{padding:12px 18px;border-bottom:1px solid var(--gray-b);display:flex;justify-content:space-between;font-size:13px;font-weight:700;color:var(--text3)}
.lb-row{padding:10px 18px;display:flex;align-items:center;gap:10px;font-size:13px;border-bottom:1px solid #f3f4f6;transition:background .15s}
.lb-row:last-child{border-bottom:none}.lb-row.me{background:var(--blue-l);border-left:3px solid var(--blue)}
.lb-scroll{max-height:480px;overflow-y:auto}
.rank{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;background:#f3f4f6;color:#374151}
.r1{background:#fef3c7;color:#78350f}.r2{background:#f3f4f6;color:#374151}.r3{background:#fee2e2;color:#991b1b}

/* TIMER */
.timer{position:relative;width:60px;height:60px;flex-shrink:0}
.timer svg{display:block;transform:rotate(-90deg)}
.t-bg{fill:none;stroke:#e5e7eb;stroke-width:5}
.t-fg{fill:none;stroke:var(--blue);stroke-width:5;stroke-linecap:round;stroke-dasharray:145;transition:stroke-dashoffset .9s linear,stroke .3s}
.t-lbl{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:14px;font-weight:800}

/* EVENT */
.ev-card{border-radius:var(--r);padding:20px;margin-bottom:16px;border:2px solid;animation:evIn .4s ease-out}
@keyframes evIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
.ev-type{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.ev-title{font-size:20px;font-weight:800;color:var(--text);margin-bottom:8px;line-height:1.3}
.ev-desc{font-size:13px;line-height:1.65;margin-bottom:14px;color:var(--text2)}
.ev-pills{display:flex;flex-wrap:wrap;gap:6px}

/* ACTIONS */
.action-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.act{padding:20px 10px;border:2px solid var(--gray-b);border-radius:var(--r);cursor:pointer;text-align:center;background:var(--card);transition:all .18s;font-family:inherit}
.act:hover{transform:translateY(-4px);box-shadow:0 6px 20px rgba(0,0,0,.12)}
.act:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.act.sell:hover,.chosen-sell{border-color:var(--red);background:var(--red-l)}
.act.hold:hover,.chosen-hold{border-color:var(--amber);background:var(--amber-l)}
.act.buy:hover,.chosen-buy{border-color:var(--green);background:var(--green-l)}
.act-lbl{font-size:15px;font-weight:800;color:var(--text);margin:8px 0 3px}
.act-sub{font-size:12px;color:var(--text3)}

/* ASSET CARDS */
.asset-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;margin-bottom:14px}
.acard{background:var(--card);border:2px solid var(--gray-b);border-radius:var(--r);padding:14px;transition:all .15s}
.acard:hover{border-color:#93c5fd}.acard.sel{border-color:var(--blue);background:var(--blue-l)}
.acard-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.acard-name{font-size:14px;font-weight:700}.acard-amt{font-size:22px;font-weight:800;margin-bottom:2px}
.acard-rr{font-size:11px;color:var(--text3);margin-bottom:8px}.acard-desc{font-size:11px;color:var(--text3);line-height:1.4}

/* RESULT */
.result-hero{text-align:center;padding:28px;border-radius:var(--r);margin-bottom:16px;border:2px solid;animation:heroIn .5s ease-out}
@keyframes heroIn{from{opacity:0;transform:translateY(-10px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.rh-pos{background:var(--green-l);border-color:var(--green-b)}
.rh-neg{background:var(--red-l);border-color:var(--red-b)}
.rh-delta{font-size:44px;font-weight:900;margin-bottom:6px}
.rh-ttl{font-size:15px;font-weight:700;margin-bottom:4px}
.rh-sub{font-size:13px;color:var(--text3)}

/* BADGES */
.player-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700}
.badge-champion{background:linear-gradient(135deg,#fef3c7,#fde68a);color:#78350f;border:1px solid #fbbf24}
.badge-bull{background:#dcfce7;color:#166534;border:1px solid #86efac}
.badge-bear{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
.badge-steady{background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe}
.badge-learner{background:#f3f4f6;color:#374151;border:1px solid #d1d5db}

/* FLOAT ANIM */
.float-pos{animation:floatUp .8s ease-out forwards}
.float-neg{animation:floatDown .8s ease-out forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-40px)}}
@keyframes floatDown{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(40px)}}
.float-label{position:fixed;font-size:20px;font-weight:900;pointer-events:none;z-index:9999}

/* HOST DASH */
.dash-hdr{background:linear-gradient(135deg,#1e3a8a,#2563eb);border-radius:var(--r);padding:24px;margin-bottom:16px;color:#fff}
.dash-title{font-size:24px;font-weight:900;margin-bottom:4px}
.room-code-pill{display:inline-block;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);border-radius:var(--r-sm);padding:8px 20px;font-size:32px;font-weight:900;letter-spacing:8px;color:#fff;margin:10px 0;cursor:pointer;transition:background .15s}
.room-code-pill:hover{background:rgba(255,255,255,.25)}
.phase-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700}
.ph-lobby{background:#dcfce7;color:#166534}.ph-alloc{background:#fef3c7;color:#92400e}
.ph-event{background:#fee2e2;color:#991b1b}.ph-result{background:#eff6ff;color:#1e40af}.ph-final{background:#f3f4f6;color:#374151}
.player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:16px}
.ptile{background:var(--card);border:1.5px solid var(--gray-b);border-radius:var(--r-sm);padding:12px;display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center;transition:all .2s}
.ptile.joined{border-color:var(--green);background:var(--green-l)}
.ptile.done{border-color:var(--blue);background:var(--blue-l)}
.ptile.playing{border-color:var(--amber);background:var(--amber-l)}
.pt-name{font-size:13px;font-weight:700;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pt-status{font-size:11px;color:var(--text3)}.pt-val{font-size:13px;font-weight:800}
.pulse{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulseA 1.5s infinite}
@keyframes pulseA{0%,100%{opacity:1}50%{opacity:.2}}

/* PODIUM */
.podium{display:flex;align-items:flex-end;justify-content:center;gap:16px;margin:24px 0 8px}
.pod-col{display:flex;flex-direction:column;align-items:center;gap:8px;animation:podIn .6s ease-out backwards}
.pod-col:nth-child(1){animation-delay:.1s}
.pod-col:nth-child(2){animation-delay:0s}
.pod-col:nth-child(3){animation-delay:.2s}
@keyframes podIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.pod-name{font-size:14px;font-weight:700;text-align:center;max-width:90px;word-break:break-word}
.pod-val{font-size:13px;font-weight:700}.pod-ret{font-size:11px;color:var(--text3)}
.pod-block{display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:900;border-radius:12px 12px 0 0;color:#fff}
.pod1{background:linear-gradient(135deg,#f59e0b,#fbbf24);box-shadow:0 4px 16px rgba(245,158,11,.4)}
.pod2{background:linear-gradient(135deg,#9ca3af,#d1d5db)}
.pod3{background:linear-gradient(135deg,#cd7c4f,#d97706)}

/* CHART */
.chart-card{background:var(--card);border-radius:var(--r);border:1px solid var(--gray-b);padding:18px;margin-bottom:16px}
.chart-lbl{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}

/* WAIT */
.wait-wrap{text-align:center;padding:48px 20px}
.wait-code{font-size:52px;font-weight:900;letter-spacing:10px;color:var(--blue);margin:16px 0;cursor:pointer}
.spinner{width:44px;height:44px;border:4px solid #e5e7eb;border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;margin:16px auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* NOTIF */
.notif{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:#fff;padding:12px 24px;border-radius:var(--r-sm);font-size:14px;font-weight:600;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.notif.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ANIMS */
.anim{animation:ain .35s ease-out}
@keyframes ain{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.shake{animation:shk .35s ease}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(5px)}}
.glow-green{animation:glowG .6s ease}
@keyframes glowG{0%{box-shadow:0 0 0 0 rgba(5,150,105,.4)}100%{box-shadow:0 0 0 12px rgba(5,150,105,0)}}
.glow-red{animation:glowR .6s ease}
@keyframes glowR{0%{box-shadow:0 0 0 0 rgba(220,38,38,.4)}100%{box-shadow:0 0 0 12px rgba(220,38,38,0)}}

/* SCORE TICKER */
.score-ticker{font-size:13px;font-weight:700;padding:4px 10px;border-radius:20px;animation:tickIn .4s ease}
@keyframes tickIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}

/* STATS BOXES */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:16px}
.sbox{background:#f8fafc;border-radius:var(--r-sm);padding:14px;text-align:center;border:1px solid var(--gray-b)}
.sbox-val{font-size:20px;font-weight:800;margin-bottom:3px}.sbox-lbl{font-size:11px;color:var(--text3)}

/* COPY BTN */
.copy-btn{background:rgba(255,255,255,.2);border:none;color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;cursor:pointer;margin-left:8px;transition:background .15s}
.copy-btn:hover{background:rgba(255,255,255,.35)}

@media(max-width:600px){
  .grid2,.grid3,.action-grid{grid-template-columns:1fr}
  .asset-grid{grid-template-columns:1fr}
  .wait-code{font-size:36px;letter-spacing:6px}
  .lang-bar{top:8px;right:8px}
  .host-layout{grid-template-columns:1fr!important}
}
</style>
</head>
<body>

<div class="lang-bar">
  <button class="lang-btn active" data-lang="en" onclick="setLang('en')">EN</button>
  <button class="lang-btn" data-lang="ru" onclick="setLang('ru')">RU</button>
  <button class="lang-btn" data-lang="az" onclick="setLang('az')">AZ</button>
</div>
<div class="notif" id="notif"></div>

<!-- ENTRY -->
<div id="p-entry" class="page active">
  <div class="wrap" style="padding-top:60px">
    <div class="tc mb24">
      <div class="brand mb8" data-i18n="brand"></div>
      <h1 style="font-size:34px;font-weight:900;margin-bottom:10px" data-i18n="tagline"></h1>
      <p class="sub mb24" id="entry-sub"></p>
    </div>
    <div class="grid2 mb24" style="max-width:460px;margin-left:auto;margin-right:auto">
      <div class="card tc" style="cursor:pointer;border:2px solid var(--blue-b);padding:28px;transition:all .2s" onclick="go('p-host-setup')" onmouseenter="this.style.transform='translateY(-3px)'" onmouseleave="this.style.transform=''">
        <svg width="44" height="44" viewBox="0 0 44 44" fill="none" style="display:block;margin:0 auto 14px"><rect x="4" y="6" width="36" height="24" rx="6" stroke="#2563eb" stroke-width="2"/><path d="M16 38h12M22 30v8" stroke="#2563eb" stroke-width="2" stroke-linecap="round"/></svg>
        <div style="font-size:17px;font-weight:800;color:var(--blue);margin-bottom:6px" data-i18n="host_btn"></div>
        <div class="sub" style="font-size:13px" data-i18n="host_desc"></div>
      </div>
      <div class="card tc" style="cursor:pointer;border:2px solid var(--green-b);padding:28px;transition:all .2s" onclick="go('p-join')" onmouseenter="this.style.transform='translateY(-3px)'" onmouseleave="this.style.transform=''">
        <svg width="44" height="44" viewBox="0 0 44 44" fill="none" style="display:block;margin:0 auto 14px"><circle cx="22" cy="16" r="8" stroke="#059669" stroke-width="2"/><path d="M7 38c0-8.3 6.7-15 15-15s15 6.7 15 15" stroke="#059669" stroke-width="2" stroke-linecap="round"/></svg>
        <div style="font-size:17px;font-weight:800;color:var(--green);margin-bottom:6px" data-i18n="join_btn"></div>
        <div class="sub" style="font-size:13px" data-i18n="join_desc"></div>
      </div>
    </div>
    <p class="tc sub" style="font-size:12px" data-i18n="entry_note"></p>
  </div>
</div>

<!-- HOST SETUP -->
<div id="p-host-setup" class="page">
  <div class="wrap">
    <div class="flex mb16" style="margin-top:8px"><button class="btn btn-outline btn-sm" onclick="go('p-entry')" data-i18n="back"></button></div>
    <div class="card mb16">
      <h2 class="mb16" data-i18n="host_setup_title"></h2>
      <div class="mb16"><div class="label mb8" data-i18n="host_pass_label"></div><input type="password" id="host-pass" data-i18n-ph="host_pass_ph"></div>
      <div class="mb16">
        <div class="label mb8" data-i18n="rounds_label"></div>
        <div class="grid3" id="rounds-sel">
          <div class="card-sm tc" data-v="4" onclick="selRound(this)" style="cursor:pointer;border:2px solid var(--gray-b)"><div style="font-size:22px;font-weight:800">4</div><div class="sub" style="font-size:12px" data-i18n="quick"></div></div>
          <div class="card-sm tc" data-v="6" onclick="selRound(this)" style="cursor:pointer;border:2px solid var(--blue);background:var(--blue-l)"><div style="font-size:22px;font-weight:800;color:var(--blue)">6</div><div style="font-size:12px;color:var(--blue)" data-i18n="standard"></div></div>
          <div class="card-sm tc" data-v="8" onclick="selRound(this)" style="cursor:pointer;border:2px solid var(--gray-b)"><div style="font-size:22px;font-weight:800">8</div><div class="sub" style="font-size:12px" data-i18n="extended"></div></div>
          <div class="card-sm tc" data-v="10" onclick="selRound(this)" style="cursor:pointer;border:2px solid var(--gray-b)"><div style="font-size:22px;font-weight:800">10</div><div class="sub" style="font-size:12px" data-i18n="pro"></div></div>
          <div class="card-sm tc" data-v="12" onclick="selRound(this)" style="cursor:pointer;border:2px solid var(--gray-b)"><div style="font-size:22px;font-weight:800">12</div><div class="sub" style="font-size:12px" data-i18n="expert"></div></div>
          <div class="card-sm tc" data-v="15" onclick="selRound(this)" style="cursor:pointer;border:2px solid var(--gray-b)"><div style="font-size:22px;font-weight:800">15</div><div class="sub" style="font-size:12px" data-i18n="master"></div></div>
        </div>
      </div>
      <div class="mb16">
        <div class="label mb8" data-i18n="diff_label"></div>
        <div class="grid3" id="diff-sel">
          <div class="card-sm tc" data-v="easy" onclick="selDiff(this)" style="cursor:pointer;border:2px solid var(--gray-b)"><div style="font-size:14px;font-weight:700" data-i18n="easy"></div><div class="sub" style="font-size:11px" data-i18n="easy_sub"></div></div>
          <div class="card-sm tc" data-v="medium" onclick="selDiff(this)" style="cursor:pointer;border:2px solid var(--blue);background:var(--blue-l)"><div style="font-size:14px;font-weight:700;color:var(--blue)" data-i18n="medium"></div><div style="font-size:11px;color:var(--blue)" data-i18n="medium_sub"></div></div>

function getAssets(){return ASSETS_DATA[currentLang]||ASSETS_DATA.en;}
function go(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');}
function f(n){return Math.max(0,Math.round(n)).toLocaleString();}
function pct(v){return(v>=0?'+':'')+parseFloat(v).toFixed(1)+'%';}
function initials(n){return n.trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)||'?';}
function $(id){return document.getElementById(id);}
function notify(msg,dur=2500){const n=$('notif');n.textContent=msg;n.classList.add('show');setTimeout(()=>n.classList.remove('show'),dur);}
async function api(path,body){const r=await fetch(API+path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json();if(!r.ok)throw new Error(d.detail||'Error');return d;}

function selRound(el){document.querySelectorAll('#rounds-sel .card-sm').forEach(e=>{e.style.border='2px solid var(--gray-b)';e.style.background='';e.querySelectorAll('div').forEach(d=>d.style.color='');});el.style.border='2px solid var(--blue)';el.style.background='var(--blue-l)';el.querySelectorAll('div').forEach(d=>d.style.color='var(--blue)');hostState.totalRounds=parseInt(el.dataset.v);}
function selDiff(el){document.querySelectorAll('#diff-sel .card-sm').forEach(e=>{e.style.border='2px solid var(--gray-b)';e.style.background='';e.querySelectorAll('div').forEach(d=>d.style.color='');});el.style.border='2px solid var(--blue)';el.style.background='var(--blue-l)';el.querySelectorAll('div').forEach(d=>d.style.color='var(--blue)');hostState.diff=el.dataset.v;}
hostState.totalRounds=6;hostState.diff='medium';

async function createRoom(){
  const pass=$('host-pass').value.trim();if(!pass){notify(t('host_pass_label'));return;}
  hostState.password=pass;
  try{const d=await api('/api/create-room',{password:pass,total_rounds:hostState.totalRounds,diff:hostState.diff});hostState.code=d.code;$('h-code').innerHTML=d.code+'<button class="copy-btn" onclick="copyCode()">'+t('copy_btn')+'</button>';$('h-url').textContent=window.location.origin+'?join='+d.code;go('p-host');connectHostWS(d.code);}
  catch(e){notify('Error: '+e.message);}
}
function connectHostWS(code){if(hostWS)hostWS.close();hostWS=new WebSocket(WS_BASE+'/ws-host/'+code);hostWS.onmessage=e=>{const d=JSON.parse(e.data);if(d.type==='state')renderHost(d.data);};hostWS.onclose=()=>setTimeout(()=>connectHostWS(code),2000);}

function renderHost(state){
  const players=Object.values(state.players||{});
  $('h-pcount').textContent=players.length;
  $('h-round-lbl').textContent=state.round+'/'+state.total_rounds;
  $('h-prog').style.width=(state.round/state.total_rounds*100)+'%';
  const done=players.filter(p=>p.round_done).length;
  $('h-done-lbl').textContent=done+'/'+players.length;
  const pm={lobby:t('ph_lobby'),alloc:t('ph_alloc'),event:t('ph_event'),result:t('ph_result'),final:t('ph_final')};
  const pc={lobby:'ph-lobby',alloc:'ph-alloc',event:'ph-event',result:'ph-result',final:'ph-final'};
  const ph=$('host-phase');ph.textContent=pm[state.phase]||state.phase;ph.className='phase-pill '+(pc[state.phase]||'ph-lobby');
  $('h-start-btn').disabled=state.phase!=='lobby';
  $('h-event-btn').disabled=state.phase!=='alloc';
  $('h-next-btn').disabled=state.phase!=='result';
  $('h-end-btn').disabled=state.phase==='final';
  $('h-pgrid').innerHTML=players.sort((a,b)=>b.capital-a.capital).map(p=>{
    let cls,st;
    if(state.phase==='alloc'){
      cls=p.confirmed_alloc?'done':'joined';
      st=p.confirmed_alloc?t('status_done'):t('status_waiting');
    } else if(state.phase==='event'){
      cls=p.round_done?'done':'playing';
      st=p.round_done?t('status_done'):t('status_playing');
    } else {
      cls=p.round_done?'done':'joined';
      st=p.round_done?t('status_done'):t('status_ready');
    }
    const chg=p.capital-10000;
    const badgeHtml=p.badge?`<span style="font-size:10px">${t('badge_'+p.badge)||''}</span>`:'';
    return`<div class="ptile ${cls}"><div class="av av-sm" style="background:${p.color}">${p.initials}</div><div class="pt-name">${p.name}</div>${badgeHtml}<div class="pt-status">${st}</div><div class="pt-val ${chg>=0?'up':'dn'}">$${f(p.capital)}</div></div>`;
  }).join('');
  renderLB('h-lb',players,'');
  if(state.phase==='final')showFinal(state);
}

async function hostAction(a){try{await api('/api/host-action',{code:hostState.code,password:hostState.password,action:a});}catch(e){notify('Error: '+e.message);}}
function hostStart(){hostAction('start');}function hostStartEvent(){hostAction('start_event');}function hostNext(){hostAction('next_round');}function hostEnd(){if(confirm(t('confirm_end')))hostAction('end');}

async function joinRoom(){
  const code=$('j-code').value.trim().toUpperCase(),name=$('j-name').value.trim(),err=$('j-err');
  err.style.display='none';
  if(!code||code.length!==4){err.textContent='Enter 4-letter code';err.style.display='block';return;}
  if(!name){err.textContent='Enter your name';err.style.display='block';return;}
  try{const d=await api('/api/join-room',{code,name});playerState={...playerState,pid:d.pid,code,name:d.name,color:d.color,capital:10000,history:[10000],acted:false};$('l-code').textContent=code;$('l-code2').textContent=code;$('l-name').textContent=name;go('p-lobby');connectPlayerWS(code,d.pid);}
  catch(e){err.textContent=e.message;err.style.display='block';}
}
function connectPlayerWS(code,pid){if(playerWS)playerWS.close();playerWS=new WebSocket(WS_BASE+'/ws/'+code+'/'+pid);playerWS.onmessage=e=>{const d=JSON.parse(e.data);if(d.type==='state')handlePlayerState(d.data);};playerWS.onclose=()=>setTimeout(()=>connectPlayerWS(code,pid),2000);}

function handlePlayerState(state){
  const players=Object.values(state.players||{});
  const me=state.players[playerState.pid];
  if(me){playerState.capital=me.capital;playerState.history=me.history||[10000];}
  $('l-pcount').textContent=players.length;
  $('l-plist').innerHTML=players.map(p=>`<div class="flex" style="background:var(--green-l);border-radius:8px;padding:6px 10px;gap:8px"><div class="av av-sm" style="background:${p.color}">${p.initials}</div><span style="font-size:13px;font-weight:600">${p.name}</span></div>`).join('');
  if(state.phase==='final'){clearInterval(gTimer);showFinal(state);return;}
  if(state.phase!==lastPhase){lastPhase=state.phase;if(state.phase==='alloc')startAllocPhase(state);else if(state.phase==='event')startEventPhase(state);else if(state.phase==='result')showRoundResult(state);}
  renderLB('g-ev-lb',players,playerState.pid);
  renderLB('g-res-lb',players,playerState.pid);
}

function startAllocPhase(state){
  go('p-game');$('g-alloc').style.display='block';$('g-event').style.display='none';$('g-result').style.display='none';
  $('g-round-lbl').textContent=t('round')+' '+state.round+' / '+state.total_rounds;
  $('g-val').textContent='$'+f(playerState.capital);
  const d=playerState.capital-10000;const chg=$('g-chg');
  chg.textContent=d===0?t('starting_capital'):(d>=0?'+':'')+' $'+f(Math.abs(d))+' ('+(d/10000*100).toFixed(1)+'%)';
  chg.className=d>0?'up':d<0?'dn':'gray';
  $('g-prog').style.width=((state.round-1)/state.total_rounds*100)+'%';
  $('g-prog-lbl').textContent=state.round+'/'+state.total_rounds;
  $('g-pname').textContent=playerState.name;$('g-av').style.background=playerState.color;$('g-av').textContent=initials(playerState.name);
  playerState.alloc={stocks:0,bonds:0,etf:0,deposit:0,cash:0};playerState.acted=false;
  $('g-confirm').textContent=t('confirm_alloc');$('g-confirm').disabled=false;
  renderAllocGrid();
}

function renderAllocGrid(){
  const g=$('g-agrid');if(!g)return;g.innerHTML='';
  getAssets().forEach(a=>{
    const p=playerState.alloc[a.id]||0,amt=Math.round(playerState.capital*p/100);
    const div=document.createElement('div');div.className='acard'+(p>0?' sel':'');div.id='ga-'+a.id;
    div.innerHTML=`<div class="acard-head"><span class="acard-name">${a.name}</span><span class="badge ${a.bc}">${a.risk}</span></div><div class="acard-amt" id="gamt-${a.id}">$${f(amt)}</div><div class="acard-rr" id="grr-${a.id}">${p}% &bull; ${a.rr}</div><input type="range" min="0" max="100" step="5" value="${p}" style="width:100%;accent-color:var(--blue);margin:6px 0 4px" oninput="gSlide('${a.id}',this.value)"><div class="acard-desc">${a.desc}</div>`;
    g.appendChild(div);
  });updAllocPct();
}
function gSlide(id,v){v=parseInt(v);playerState.alloc[id]=v;const tot=gTot();if(tot>100){playerState.alloc[id]=v-(tot-100);v=playerState.alloc[id];document.querySelector('#ga-'+id+' input').value=v;}$('gamt-'+id).textContent='$'+f(Math.round(playerState.capital*v/100));$('grr-'+id).textContent=v+' \u2022 '+getAssets().find(a=>a.id===id).rr;$('ga-'+id).className='acard'+(v>0?' sel':'');updAllocPct();}
function gTot(){return Object.values(playerState.alloc).reduce((a,b)=>a+b,0);}
function updAllocPct(){$('g-apct').textContent=gTot()+'%';}
function gAutoBalance(){playerState.alloc={stocks:30,bonds:20,etf:25,deposit:15,cash:10};renderAllocGrid();}
async function gConfirm(){if(gTot()<90){const b=$('g-confirm');b.classList.add('shake');setTimeout(()=>b.classList.remove('shake'),400);return;}try{await api('/api/player-action',{code:playerState.code,pid:playerState.pid,action:'set_alloc',alloc:playerState.alloc});$('g-confirm').textContent=t('waiting_alloc');$('g-confirm').disabled=true;notify('✓');}catch(e){notify('Error: '+e.message);}}

function startEventPhase(state){
  $('g-alloc').style.display='none';$('g-event').style.display='block';$('g-result').style.display='none';
  playerState.acted=false;const ev=state.current_event;if(!ev)return;playerState.currentEvent=ev;
  const evLang=currentLang;
  const evType=ev.type&&ev.type[evLang]?ev.type[evLang]:(ev.type&&ev.type.en?ev.type.en:ev.type||'');
  const evTitle=ev.title&&ev.title[evLang]?ev.title[evLang]:(ev.title&&ev.title.en?ev.title.en:ev.title||'');
  const evDesc=ev.desc&&ev.desc[evLang]?ev.desc[evLang]:(ev.desc&&ev.desc.en?ev.desc.en:ev.desc||'');
  const evPills=(ev.pills&&ev.pills[evLang]?ev.pills[evLang]:(ev.pills&&ev.pills.en?ev.pills.en:ev.pills||[]));
  $('g-ev-banner').innerHTML=`<div class="ev-card" style="background:${ev.col};border-color:${ev.brd}"><div class="ev-type" style="color:${ev.tc}">${evType}</div><div class="ev-title">${evTitle}</div><div class="ev-desc">${evDesc}</div><div class="ev-pills">${evPills.map(p=>`<span class="badge ${p.c}" style="padding:4px 12px">${p.t}</span>`).join('')}</div></div>`;
  ['sell','hold','buy'].forEach(a=>{const el=$('g-'+a);el.className='act '+a;el.onclick=()=>gAction(a);el.disabled=false;});
  const times={easy:60,medium:30,hard:15};startGTimer(times[state.diff]||30);
}
function startGTimer(sec){clearInterval(gTimer);let t2=sec;const fg=$('g-tfg'),txt=$('g-ttxt'),C=145,total=sec;function tick(){txt.textContent=t2;fg.style.strokeDashoffset=C*(1-t2/total);fg.style.stroke=t2<=5?'#dc2626':t2<=Math.ceil(total*.3)?'#d97706':'#2563eb';if(t2<=0){clearInterval(gTimer);if(!playerState.acted)gAction('hold');return;}t2--;}tick();gTimer=setInterval(tick,1000);}

async function gAction(action){
  if(playerState.acted)return;playerState.acted=true;clearInterval(gTimer);
  ['sell','hold','buy'].forEach(a=>{const el=$('g-'+a);el.className='act '+a+(a===action?' chosen-'+action:'');el.onclick=null;el.disabled=true;});
  try{
    const prevCap=playerState.capital;
    const d=await api('/api/player-action',{code:playerState.code,pid:playerState.pid,action});
    const delta=d.capital-prevCap;
    playerState.capital=d.capital;
    showFloatLabel((delta>=0?'+':'')+' $'+f(Math.abs(delta)),delta>=0);
    const valEl=$('g-val');valEl.textContent='$'+f(d.capital);
    valEl.classList.add(delta>=0?'glow-green':'glow-red');setTimeout(()=>valEl.classList.remove('glow-green','glow-red'),600);
  }catch(e){notify('Error: '+e.message);}
}

function showRoundResult(state){
  $('g-alloc').style.display='none';$('g-event').style.display='none';$('g-result').style.display='block';
  $('g-res-r').textContent=state.round;
  const me=state.players[playerState.pid];
  if(me){
    const hist=me.history||[10000],prev=hist.length>=2?hist[hist.length-2]:10000,delta=me.capital-prev,pos=delta>=0;
    const dec=(me.decisions||[]).slice(-1)[0],action=dec?dec.action:'hold';
    const cm={sell:{true:t('sell_pos'),false:t('sell_neg')},hold:{true:t('hold_pos'),false:t('hold_neg')},buy:{true:t('buy_pos'),false:t('buy_neg')}};
    $('g-res-hero').innerHTML=`<div class="result-hero ${pos?'rh-pos':'rh-neg'}"><div class="rh-delta ${pos?'up':'dn'}">${pos?'+':'-'}$${f(Math.abs(delta))}</div><div class="rh-ttl">${me.name} — ${t(action)}</div><div class="rh-sub">${(cm[action]||cm.hold)[pos.toString()]}</div></div>`;
    $('g-val').textContent='$'+f(me.capital);
  }
  $('g-wait-msg').textContent=state.round>=state.total_rounds?t('all_rounds_done'):t('wait_host');
}

function renderLB(id,players,myPid){
  const sorted=[...players].sort((a,b)=>b.capital-a.capital),maxV=sorted[0]?.capital||10000,el=$(id);if(!el)return;
  el.innerHTML=sorted.map((p,i)=>{
    const chg=p.capital-10000,isMe=p.name===playerState.name;
    const bar=`<div style="flex:1;height:5px;background:#f3f4f6;border-radius:3px;overflow:hidden"><div style="height:100%;width:${Math.round(p.capital/maxV*100)}%;background:${p.color||'#2563eb'};border-radius:3px;transition:width .5s"></div></div>`;
    const badgeHtml=p.badge?`<span style="font-size:11px;margin-left:4px">${t('badge_'+p.badge)||''}</span>`:'';
    return`<div class="lb-row${isMe?' me':''}">
      <div class="rank ${i===0?'r1':i===1?'r2':i===2?'r3':''}">${i+1}</div>
      <div class="av av-sm" style="background:${p.color||'#2563eb'}">${p.initials||'?'}</div>
      <div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}${isMe?' ('+t('you')+')':''}${badgeHtml}</div>${bar}</div>
      <div style="text-align:right;min-width:84px"><div style="font-weight:800;font-size:14px">$${f(p.capital)}</div><div style="font-size:11px;color:${chg>=0?'var(--green)':'var(--red)'}">${pct((chg/10000)*100)}</div></div>
    </div>`;
  }).join('');
}

function showFinal(state){
  go('p-final');
  const players=Object.values(state.players||{}).sort((a,b)=>b.capital-a.capital);
  $('f-sub').textContent=players.length+' players \u2022 '+state.total_rounds+' rounds';
  renderPodium(players);renderLB('f-lb',players,'');renderFinalChart(players);renderInsights(players);
}

function renderPodium(sorted){
  const n=sorted.length;
  let order,heights,sizes,bCls,medals;
  if(n===1){order=[sorted[0]];heights=[130];sizes=[72];bCls=['pod1'];medals=['1'];}
  else if(n===2){order=[sorted[1],sorted[0]];heights=[100,130];sizes=[54,72];bCls=['pod2','pod1'];medals=['2','1'];}
  else{order=[sorted[1],sorted[0],sorted[2]];heights=[100,130,78];sizes=[54,72,46];bCls=['pod2','pod1','pod3'];medals=['2','1','3'];}
  $('f-podium').innerHTML=order.filter(Boolean).map((p,i)=>{
    const ret=(p.capital-10000)/10000*100;
    const badgeHtml=p.badge?`<div class="player-badge badge-${p.badge}" style="margin-top:-4px">${t('badge_'+p.badge)||''}</div>`:'';
    return`<div class="pod-col">
      <div class="av" style="background:${p.color};width:${sizes[i]}px;height:${sizes[i]}px;font-size:${Math.round(sizes[i]/3)}px">${p.initials}</div>
      <div class="pod-name">${p.name}</div>
      ${badgeHtml}
      <div class="pod-val ${ret>=0?'up':'dn'}">$${f(p.capital)}</div>
      <div class="pod-ret">${pct(ret)}</div>
      <div class="pod-block ${bCls[i]}" style="width:88px;height:${heights[i]}px">${medals[i]}</div>
    </div>`;
  }).join('');
}

function renderFinalChart(players){
  if(finalChartInst)finalChartInst.destroy();
  const maxLen=Math.max(...players.map(p=>(p.history||[10000]).length));
  const labels=Array.from({length:maxLen},(_,i)=>i===0?'Start':'R'+i);
  finalChartInst=new Chart($('f-chart'),{
    type:'line',
    data:{labels,datasets:players.slice(0,20).map(p=>({label:p.name,data:p.history||[10000],borderColor:p.color||'#2563eb',backgroundColor:'transparent',borderWidth:2,pointRadius:3,pointBackgroundColor:p.color||'#2563eb',tension:.35}))},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{boxWidth:10,padding:10,font:{size:11}}}},scales:{y:{ticks:{callback:v=>'$'+Math.round(v/1000)+'k',font:{size:11}},grid:{color:'#f3f4f6'}},x:{grid:{display:false},ticks:{font:{size:11}}}}}
  });
}

function renderInsights(players){
  const winner=players[0],avg=players.reduce((s,p)=>s+p.capital,0)/players.length;
  const items=[
    {c:'#f59e0b',t:t('ins_champion')+': '+winner.name,d:t('ins_champion_d').replace('%val%',f(winner.capital)).replace('%ret%',pct((winner.capital-10000)/100)).replace('%n%',players.length-1)},
    {c:'#2563eb',t:t('ins_avg'),d:t('ins_avg_d').replace('%val%',f(avg)).replace('%ret%',pct((avg-10000)/100))},
    {c:'#059669',t:t('ins_divers'),d:t('ins_divers_d')},
    {c:'#7c3aed',t:t('ins_core'),d:t('ins_core_d')}
  ];
  $('f-insights').innerHTML=items.map(it=>`<div style="display:flex;gap:12px;align-items:flex-start;padding:14px 0;border-bottom:1px solid #f3f4f6"><div style="width:8px;height:8px;border-radius:50%;background:${it.c};flex-shrink:0;margin-top:5px"></div><div><div style="font-size:13px;font-weight:700;margin-bottom:3px">${it.t}</div><div style="font-size:12px;color:#6b7280;line-height:1.55">${it.d}</div></div></div>`).join('');
}

(function(){const p=new URLSearchParams(window.location.search),code=p.get('join');if(code){$('j-code').value=code.toUpperCase();go('p-join');}updateDyn();applyLang();})();
</script>
</body>
